<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangar Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1e1e1e; overflow: hidden; }
    #terminal { height: 100%; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const term = new Terminal({ cursorBlink: true, theme: { background: '#1e1e1e' } });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    const slug = 'v2-' + Math.random().toString(36).substring(2, 10);

    fetch('/api/v1/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, kind: { type: 'shell' }, cols: term.cols, rows: term.rows }),
    })
      .then(r => r.json())
      .then(session => {
        const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(wsProto + '//' + location.host + '/ws/v1/sessions/' + session.id + '/pty');
        ws.binaryType = 'arraybuffer';

        ws.onmessage = (e) => {
          if (e.data instanceof ArrayBuffer) {
            term.write(new Uint8Array(e.data));
          } else {
            term.write(e.data);
          }
        };

        ws.onopen = () => {
          term.onData((data) => ws.send(data));
          term.onResize(({ cols, rows }) => ws.send(JSON.stringify({ type: 'resize', cols, rows })));
        };

        ws.onclose = () => term.write('\r\n\x1b[31m[disconnected]\x1b[0m\r\n');
        ws.onerror = () => term.write('\r\n\x1b[31m[connection error]\x1b[0m\r\n');
      })
      .catch(err => {
        term.write('\x1b[31m[failed to create session: ' + err.message + ']\x1b[0m\r\n');
      });

    window.addEventListener('resize', () => fitAddon.fit());
  </script>
</body>
</html>
