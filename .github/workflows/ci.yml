name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal markdown links
        shell: bash
        run: |
          set -u
          missing=0
          shopt -s globstar nullglob
          for file in README.md CHANGELOG.md docs/**/*.md; do
            [ -f "$file" ] || continue
            while read -r ref; do
              target=${ref#*\(}
              target=${target%\)}
              target=${target%%#*}
              [ -z "$target" ] && continue
              case "$target" in
                http://*|https://*|mailto:*|tel:*) continue ;;
              esac
              dir=$(dirname "$file")
              if [ ! -e "$dir/$target" ]; then
                echo "::warning file=$file::broken internal link -> $target"
                missing=$((missing + 1))
              fi
            done < <(grep -oE '\]\([^)]+\)' "$file" || true)
          done
          echo "Total broken internal links: $missing"
          # Warn-only for now; will enforce once doc set stabilizes.

  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for backend
        id: check
        run: |
          if [ -f backend/Cargo.toml ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.check.outputs.present == 'true'
        with:
          components: rustfmt, clippy
      - name: fmt
        if: steps.check.outputs.present == 'true'
        working-directory: backend
        run: cargo fmt --all -- --check
      - name: clippy
        if: steps.check.outputs.present == 'true'
        working-directory: backend
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        if: steps.check.outputs.present == 'true'
        working-directory: backend
        run: cargo test --all

  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for frontend
        id: check
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
          fi
      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.present == 'true'
        with:
          version: 9
      - uses: actions/setup-node@v4
        if: steps.check.outputs.present == 'true'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: install
        if: steps.check.outputs.present == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: build
        if: steps.check.outputs.present == 'true'
        working-directory: frontend
        run: pnpm build
